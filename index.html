<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitScore360 | Get Visible. Get Ranked. Get Hired.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              handshake: {
                red: '#ff3333',
                black: '#1f1f1f',
                gray: '#f4f4f4',
              },
              fit: {
                green: '#86bc25',
                blue: '#004c97',
                dark: '#1e293b',
                accent: '#38bdf8',
                success: '#10b981',
                warning: '#f59e0b',
                danger: '#ef4444',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      
      .logo-fit { color: #86bc25; }
      .logo-score { color: #475569; }
      .logo-360 { color: #94a3b8; }
      
      @keyframes fadeInScale {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-fadeInScale { animation: fadeInScale 0.3s ease-out forwards; }

      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }

      .premium-blur {
        filter: blur(4px);
        user-select: none;
        pointer-events: none;
      }
      
      .banner-gradient {
        background: #86bc25;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes confetti-burst {
        0% { transform: translateY(0) scale(0); opacity: 1; }
        100% { transform: translateY(-100px) translateX(var(--tx)) rotate(var(--tr)); opacity: 0; }
      }
      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #86bc25;
        border-radius: 2px;
        animation: confetti-burst 1s ease-out forwards;
      }

      .platinum-glow {
        box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        border: 1px solid #f59e0b;
        color: #b45309;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
